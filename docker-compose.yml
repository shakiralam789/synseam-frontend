name: synseam-frontend

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      # Use localhost for client-side fetches (browser talks to port 4000)
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    networks:
      - synseam_net

networks:
  synseam_net:
    external: true
